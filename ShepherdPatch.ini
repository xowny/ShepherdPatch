# ShepherdPatch for Silent Hill Homecoming
# Current focus: safe resolution changes, DPI awareness, raw mouse input,
# cleaner timing on modern Windows, crash-dump capture, and optional presentation fixes.

EnableSafeResolutionChanges = true
EnableDpiAwareness = true
EnableUltrawideFovFix = true
ForceBorderless = true
RetryResetInWindowedMode = true
EnableHighPrecisionTiming = true
RequestHighResolutionTimer = true
EnableRawMouseInput = true
EnablePreciseSleepShim = true
EnableCrashDumps = true
EnableFrameRateUnlock = true
RawMouseSensitivity = 1.0
InvertRawMouseY = false
SynchronizeEngineVars = true
EnableGamesMmcssProfile = true
DisablePowerThrottling = true
DisableVsync = false
DisableLegacyPeriodicIconicTimer = true
ReduceLegacyWaitableTimerPolling = true
HardenLegacyGraphicsRecovery = true
HardenLegacyThreadWrapper = true
HardenDirectInputMouseDevice = true
ReduceBorderlessPresentStutter = true
ReduceMenuMovieStutter = true
EnableFlipExSwapEffect = true
LegacyGraphicsRetryDelayMilliseconds = 100
LegacyThreadTerminateGraceMilliseconds = 250
PresentWakeLeadMilliseconds = 0.75
TargetFrameRate = 60
MaximumPresentationInterval = 1

# Only relevant on displays wider than 16:9.
EnableHudViewportClamp = true
HudViewportAspectRatio = 1.77777778

# Clamp multi-vsync device requests down to one interval.
# On a 60 Hz display, this turns a D3D "interval 2" 30 FPS cap into 60 FPS.
# Set DisableVsync = true to force D3D immediate mode instead.
# DisableLegacyPeriodicIconicTimer suppresses the engine's pointless 33 ms
# timeSetEvent/timeKillEvent loop that only polls IsIconic(hwnd).
# ReduceLegacyWaitableTimerPolling redirects the engine's separate waitable-timer
# worker away from a coarse Sleep(1) polling tail and onto its own timer handle.
# HardenLegacyGraphicsRecovery clamps the engine's 5-second graphics bootstrap
# retry sleep to LegacyGraphicsRetryDelayMilliseconds instead of stalling.
# HardenLegacyThreadWrapper softens the engine's thread wrapper by refusing
# suspend/resume calls against dead or self targets and by grace-waiting before
# falling back to legacy TerminateThread shutdown.
# HardenDirectInputMouseDevice normalizes the legacy DirectInput mouse device into
# a raw-input-friendly cooperative mode and smooths over input-lost reacquire churn.
# RawMouseSensitivity scales the raw-input mouse delta before it is written into
# the legacy DirectInput mouse state.
# InvertRawMouseY flips the raw-input Y axis after sensitivity is applied.
# ReduceBorderlessPresentStutter forces borderless/windowed D3D devices into
# immediate presentation while the engine-side frame cap still holds cadence.
# ReduceMenuMovieStutter forces known menu-loop Bink movies off their internal
# wait path so they stop injecting random Present stalls into otherwise stable gameplay.
# EnableFlipExSwapEffect promotes the D3D9Ex borderless path to FLIPEX, which
# gives the DWM a modern flip-model presentation queue instead of DISCARD.
# PresentWakeLeadMilliseconds lets the scheduler wake slightly early to reduce
# missed-vblank Present stalls while keeping vsync enabled.

# Optional fallbacks for the windowed retry path.
# Leave 0 to keep the game's requested size.
FallbackWidth = 0
FallbackHeight = 0
FallbackRefreshRate = 60
